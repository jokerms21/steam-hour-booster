<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Steam Hour Booster</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Steam Hour Booster</h1>
            <div id="stats">
                <span class="stat">
                    <span class="dot green"></span>
                    <strong id="online-count">0</strong> Online
                </span>
                <span class="stat-divider">/</span>
                <span class="stat">
                    <strong id="total-count">0</strong> Total
                </span>
            </div>
        </div>
        <div class="header-right">
            <div class="header-actions desktop-only">
                <div class="btn-group-ghost">
                    <button id="pause-all-btn" class="btn-ghost" title="Pause All">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                        Pause All
                    </button>
                    <button id="resume-all-btn" class="btn-ghost" title="Resume All">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Resume All
                    </button>
                </div>
                <button id="add-account-btn" class="btn-accent-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Account
                </button>
                <div class="header-divider"></div>
                <button id="bug-report-btn" class="btn-icon-sm" title="Bug Report">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2l1.88 1.88M14.12 3.88L16 2M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9M6.53 9H2M6 13H2M6.53 17H2M17.47 9H22M18 13h4M17.47 17H22"/></svg>
                </button>
                <button id="theme-toggle" class="btn-icon-sm" title="Toggle theme">☀️</button>
            </div>
            <div class="header-actions mobile-only">
                <button id="bug-report-btn-m" class="btn-icon-sm" title="Bug Report">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2l1.88 1.88M14.12 3.88L16 2M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9M6.53 9H2M6 13H2M6.53 17H2M17.47 9H22M18 13h4M17.47 17H22"/></svg>
                </button>
                <button id="theme-toggle-m" class="btn-icon-sm" title="Toggle theme">☀️</button>
            </div>
        </div>
    </header>

    <main>
        <div id="bulk-actions" class="bulk-actions hidden">
            <span id="selected-count">0 selected</span>
            <button id="bulk-pause-btn" class="btn warning">Pause Selected</button>
            <button id="bulk-resume-btn" class="btn primary">Resume Selected</button>
            <button id="bulk-delete-btn" class="btn danger">Delete Selected</button>
            <button id="bulk-deselect-btn" class="btn">Deselect All</button>
        </div>
        <div id="accounts-grid"></div>
    </main>

    <!-- FAB: Floating Action Button (mobile) -->
    <div id="fab" class="fab">
        <div id="fab-menu" class="fab-menu hidden">
            <button id="fab-add" class="fab-item" title="Add Account">
                <span class="fab-item-icon">+</span>
                <span class="fab-item-label">Add Account</span>
            </button>
            <button id="fab-pause-all" class="fab-item warning-bg" title="Pause All">
                <span class="fab-item-icon">⏸</span>
                <span class="fab-item-label">Pause All</span>
            </button>
            <button id="fab-resume-all" class="fab-item success-bg" title="Resume All">
                <span class="fab-item-icon">▶</span>
                <span class="fab-item-label">Resume All</span>
            </button>
        </div>
        <button id="fab-toggle" class="fab-toggle" title="Menu">+</button>
    </div>

    <!-- Logs Panel (collapsible accordion) -->
    <aside id="logs-panel">
        <div class="logs-header" id="logs-header">
            <h2>Logs</h2>
            <div class="logs-header-right">
                <div class="logs-filters desktop-only-filters">
                    <select id="log-filter-user">
                        <option value="all">All accounts</option>
                    </select>
                    <select id="log-filter">
                        <option value="all">All levels</option>
                        <option value="error">Errors</option>
                        <option value="warn">Warnings</option>
                    </select>
                    <button id="log-export-btn" class="btn-icon" title="Export logs">📥</button>
                </div>
                <span id="logs-toggle-icon" class="logs-toggle-icon">▲</span>
            </div>
        </div>
        <div id="logs-body" class="logs-body">
            <div class="logs-filters-mobile">
                <select id="log-filter-user-m">
                    <option value="all">All accounts</option>
                </select>
                <select id="log-filter-m">
                    <option value="all">All levels</option>
                    <option value="error">Errors</option>
                    <option value="warn">Warnings</option>
                </select>
                <button id="log-export-btn-m" class="btn-icon" title="Export logs">📥</button>
            </div>
            <div id="logs-list"></div>
        </div>
    </aside>

    <!-- Modal: Add/Edit Account (full-screen on mobile, wizard) -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <div class="modal-header">
                <button id="modal-back" class="btn-icon modal-back hidden" title="Back">←</button>
                <h3 id="modal-title">Add Account</h3>
                <button id="modal-close" class="btn-icon">&times;</button>
            </div>

            <!-- Step indicator -->
            <div id="wizard-steps" class="wizard-steps">
                <div class="wizard-step active" data-step="1"><span>1</span><small>Account</small></div>
                <div class="wizard-connector"></div>
                <div class="wizard-step" data-step="2"><span>2</span><small>Games</small></div>
                <div class="wizard-connector"></div>
                <div class="wizard-step" data-step="3"><span>3</span><small>Settings</small></div>
            </div>

            <form id="account-form">
                <!-- Step 1: Account Credentials -->
                <div id="wizard-panel-1" class="wizard-panel active">
                    <div class="form-group">
                        <label>Login Method</label>
                        <div class="login-method-toggle">
                            <button type="button" class="login-method-btn active" data-method="credentials">Password</button>
                            <button type="button" class="login-method-btn" data-method="qrcode">QR Code</button>
                        </div>
                        <input type="hidden" id="form-loginMethod" value="credentials">
                    </div>
                    <div class="form-group">
                        <label for="form-username">Username</label>
                        <input type="text" id="form-username" required pattern="[a-zA-Z0-9_.@]+" autocomplete="username">
                    </div>
                    <div class="form-group password-group">
                        <label for="form-password">Password</label>
                        <input type="password" id="form-password" placeholder="Leave empty to keep current" autocomplete="current-password">
                    </div>
                </div>

                <!-- Step 2: Game Configuration -->
                <div id="wizard-panel-2" class="wizard-panel">
                    <div class="form-group">
                        <label>Game App IDs <span id="games-count" class="games-count"></span></label>
                        <div id="games-tags-container">
                            <div id="games-tags"></div>
                            <input type="text" id="form-games" placeholder="Type ID and press Enter">
                        </div>
                        <div class="game-search-wrapper">
                            <div class="game-search-input-row">
                                <input type="text" id="game-search" placeholder="Search game by name...">
                                <button type="button" id="game-search-btn" class="btn">Find</button>
                            </div>
                            <div id="game-search-results" class="game-search-results hidden"></div>
                        </div>
                    </div>
                </div>

                <!-- Step 3: Settings -->
                <div id="wizard-panel-3" class="wizard-panel">
                    <div class="form-group">
                        <label for="form-online">Online Status</label>
                        <select id="form-online">
                            <option value="false">Offline</option>
                            <option value="true">Online</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Schedule</label>
                        <div class="schedule-toggle">
                            <input type="checkbox" id="form-schedule-enabled">
                            <label for="form-schedule-enabled">Enable schedule</label>
                        </div>
                        <div id="schedule-fields" class="schedule-fields hidden">
                            <div class="schedule-row">
                                <div class="form-group">
                                    <label>Start</label>
                                    <div class="time-inputs">
                                        <input type="number" id="form-schedule-start-hour" min="0" max="23" value="0" placeholder="HH">
                                        <span>:</span>
                                        <input type="number" id="form-schedule-start-minute" min="0" max="59" value="0" placeholder="MM">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>End</label>
                                    <div class="time-inputs">
                                        <input type="number" id="form-schedule-end-hour" min="0" max="23" value="0" placeholder="HH">
                                        <span>:</span>
                                        <input type="number" id="form-schedule-end-minute" min="0" max="59" value="0" placeholder="MM">
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="form-schedule-timezone">Timezone</label>
                                <select id="form-schedule-timezone">
                                    <option value="UTC">UTC</option>
                                    <option value="Europe/Moscow">Moscow (UTC+3)</option>
                                    <option value="Europe/Kiev">Kiev (UTC+2)</option>
                                    <option value="America/New_York">New York (UTC-5)</option>
                                    <option value="America/Los_Angeles">Los Angeles (UTC-8)</option>
                                    <option value="Asia/Tokyo">Tokyo (UTC+9)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sticky Footer -->
                <div class="modal-footer">
                    <button type="button" id="form-cancel" class="btn">Cancel</button>
                    <button type="button" id="form-back" class="btn hidden">Back</button>
                    <button type="button" id="form-next" class="btn primary">Next</button>
                    <button type="submit" id="form-save" class="btn primary hidden">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: QR Login -->
    <div id="qr-overlay" class="hidden">
        <div id="qr-modal">
            <div class="modal-header">
                <h3>QR Login</h3>
                <button id="qr-close" class="btn-icon">&times;</button>
            </div>
            <div id="qr-content">
                <p id="qr-username"></p>
                <div id="qr-image"></div>
                <div id="qr-timer"></div>
                <p id="qr-status">Waiting for QR code...</p>
            </div>
        </div>
    </div>

    <!-- Modal: Steam Guard -->
    <div id="sg-overlay" class="hidden">
        <div id="sg-modal">
            <div class="modal-header">
                <h3>Steam Guard</h3>
            </div>
            <div id="sg-content">
                <p id="sg-username"></p>
                <p id="sg-hint">Enter the code from your Steam Guard authenticator app or email.</p>
                <input type="text" id="sg-code" placeholder="XXXXX" maxlength="5" autocomplete="one-time-code" autofocus inputmode="numeric">
                <div id="sg-error" class="hidden"></div>
                <div class="form-actions">
                    <button id="sg-console" class="btn">Use Console</button>
                    <button id="sg-submit" class="btn primary">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet: Account Actions -->
    <div id="bottom-sheet-overlay" class="hidden">
        <div id="bottom-sheet">
            <div class="bottom-sheet-handle"></div>
            <div class="bottom-sheet-header">
                <span id="bottom-sheet-username"></span>
            </div>
            <div class="bottom-sheet-items">
                <button id="bs-edit" class="bottom-sheet-item">
                    <svg class="bs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Edit
                </button>
                <button id="bs-qr-login" class="bottom-sheet-item hidden">
                    <svg class="bs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    QR Login
                </button>
                <button id="bs-delete" class="bottom-sheet-item danger">
                    <svg class="bs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Dialog -->
    <div id="confirm-overlay" class="hidden">
        <div id="confirm-dialog">
            <h3>Delete Account?</h3>
            <p id="confirm-text">Are you sure you want to delete <strong id="confirm-username"></strong>? This cannot be undone.</p>
            <div class="confirm-actions">
                <button id="confirm-cancel" class="btn">Cancel</button>
                <button id="confirm-delete" class="btn danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
